# https://docs.amvera.ru/applications/environments/nodejs-server.html
meta:
  environment: node
  toolchain:
    name: npm
    version: "20"

build:
  additionalCommands: npm run build

run:
  command: npm run start
  # Должен совпадать с портом в server/index.ts (production: 80). Не ставьте PORT=5000 в Amvera.
  containerPort: 80
