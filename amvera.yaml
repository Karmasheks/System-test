meta:
  environment: node
  toolchain:
    name: npm
    version: 20

build:
  # Сброс рабочей копии из git (Amvera иногда держит старый кэш без client/ и scripts/)
  additionalCommands: git reset --hard HEAD && rm -rf node_modules dist project-source.tar.gz && npm install && npm run build

run:
  scriptName: index.js
  containerPort: 80
