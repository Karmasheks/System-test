meta:
  environment: node
  toolchain:
    name: npm
    version: 20

build:
  # Amvera клонирует git в /git, а сборка идёт в /source (там часто нет client/)
  additionalCommands: sh -c "set -e && rsync -a /git/ /source/ --exclude node_modules --exclude dist && cd /source && test -f client/index.html && rm -rf node_modules dist project-source.tar.gz && npm install && npm run build"

run:
  scriptName: index.js
  containerPort: 80
