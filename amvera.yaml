meta:
  environment: node
  toolchain:
    name: npm
    version: 20

build:
  # /git в builder часто недоступен — собираем в /source (client/ уже в архиве)
  additionalCommands: sh -c 'cd /source && test -f client/index.html && rm -rf node_modules dist project-source.tar.gz && npm install && npm run build && test -f dist/index.js'

run:
  scriptName: index.js
  containerPort: 80
