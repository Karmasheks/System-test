meta:
  environment: node
  toolchain:
    name: npm
    version: 20

build:
  additionalCommands: sh /source/scripts/amvera-build.sh
  # Папки целиком, без /** — маска ** копирует каждый файл в корень / и ломает tar (resolve и т.д.)
  artifacts:
    "dist": /
    "node_modules": /
    "index.js": /
    "package.json": /
    "package-lock.json": /
    "uploads": /

run:
  scriptName: index.js
  containerPort: 80
