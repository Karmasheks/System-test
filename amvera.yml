meta:
  environment: node
  toolchain:
    name: npm
    version: 20

build:
  additionalCommands: sh /git/scripts/amvera-build.sh
  artifacts:
    "dist/**": /
    "node_modules/**": /
    "index.js": /
    "package.json": /
    "package-lock.json": /
    "uploads/**": /

run:
  scriptName: index.js
  containerPort: 80
