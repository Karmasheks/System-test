meta:
  environment: node
  toolchain:
    name: npm
    version: 20

build:
  additionalCommands: sh -c "set -e && cd /git && rm -rf node_modules dist project-source.tar.gz && npm install && npm run build && test -f dist/index.js && rsync -a /git/ /source/ --exclude .git"

run:
  scriptName: index.js
  containerPort: 80
