meta:
  environment: node
  toolchain:
    name: npm
    version: 20

build:
  additionalCommands: sh -c 'if [ -d /git/client ]; then cp -a /git/client /source/; [ -d /git/shared ] && cp -a /git/shared /source/; fi; cd /source && rm -rf dist && npm run build && test -f dist/index.js'
  artifacts:
    "dist/**": /
    "node_modules/**": /
    "index.js": /
    "package.json": /
    "package-lock.json": /
    "uploads/**": /

run:
  scriptName: index.js
  containerPort: 80
